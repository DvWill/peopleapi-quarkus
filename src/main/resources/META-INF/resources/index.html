
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CRUD Users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Gerenciamento de Usuários</h2>

    <!-- FORMULÁRIO CREATE -->

    <div class="card mb-4">
        <div class="card-body">

            <div class="row g-2">

                <div class="col-md-5">
                    <input id="username" class="form-control" placeholder="Username">
                </div>

                <div class="col-md-5">
                    <input id="email" class="form-control" placeholder="Email">
                </div>

                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" onclick="createUser()">Criar</button>
                </div>

            </div>

        </div>
    </div>


    <!-- TABELA -->

    <table class="table table-striped table-bordered">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody id="userTable"></tbody>

    </table>

</div>


<!-- MODAL EDIT -->

<div class="modal fade" id="editModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Editar Usuário</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="editId">

                <div class="mb-3">
                    <label>Username</label>
                    <input id="editUsername" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input id="editEmail" class="form-control">
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-success" onclick="updateUser()">Salvar</button>
            </div>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>

    const API="/users";

    let modal=new bootstrap.Modal(document.getElementById('editModal'));


    /* ======================
    LISTAR USERS
    ====================== */

    async function loadUsers(){

        const response=await fetch(API);

        const users=await response.json();

        const table=document.getElementById("userTable");

        table.innerHTML="";

        users.forEach(user=>{

            table.innerHTML+=`
<tr>
<td>${user.id}</td>
<td>${user.username}</td>
<td>${user.email}</td>

<td>

<button class="btn btn-warning btn-sm"
onclick="openEdit('${user.id}','${user.username}','${user.email}')">

Editar
</button>

<button class="btn btn-danger btn-sm"
onclick="deleteUser('${user.id}')">

Delete
</button>

</td>

</tr>
`;

        });

    }



    /* ======================
    CREATE USER
    ====================== */

    async function createUser(){

        const username=document.getElementById("username").value;

        const email=document.getElementById("email").value;

        await fetch(API,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                username:username,
                email:email

            })

        });

        loadUsers();

    }



    /* ======================
    DELETE USER
    ====================== */

    async function deleteUser(id){

        await fetch(API+"/"+id,{
            method:"DELETE"
        });

        loadUsers();

    }



    /* ======================
    ABRIR MODAL EDIT
    ====================== */

    function openEdit(id,username,email){

        document.getElementById("editId").value=id;

        document.getElementById("editUsername").value=username;

        document.getElementById("editEmail").value=email;

        modal.show();

    }



    /* ======================
    UPDATE USER
    ====================== */

    async function updateUser(){

        const id=document.getElementById("editId").value;

        const username=document.getElementById("editUsername").value;

        const email=document.getElementById("editEmail").value;

        await fetch(API+"/"+id,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                username:username,
                email:email

            })

        });

        modal.hide();

        loadUsers();

    }


    /* ======================
    LOAD INITIAL DATA
    ====================== */

    loadUsers();

</script>

</body>
</html>
